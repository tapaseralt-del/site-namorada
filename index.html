<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feliz Dia das Mulheres, Ana</title>

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff4da6,#ff99cc,#8a2be2);
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

h1{
font-size:55px;
}

p{
font-size:22px;
max-width:600px;
margin:auto;
margin-top:20px;
}

.heart{
position:absolute;
font-size:30px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}
</style>

</head>

<body>

<div class="container">

<h1>Feliz Dia das Mulheres, Ana! 🌸</h1>

<p>Ana, hoje é um dia especial para celebrar mulheres incríveis como você.</p>

<p>Espero que seu dia seja cheio de alegria, carinho e momentos felizes.</p>

<p>Você é uma amiga muito especial. 💖</p>

<p>Clique na tela para tocar a música 🎵</p>

</div>

<audio id="musica" loop>
<source src="EU TE ESCOLHERIA TODO DIA - PAGODE - PAGODES PARA STATUS.mp3" type="audio/mpeg">
</audio>

<script>
document.body.addEventListener("click", function(){
document.getElementById("musica").play();
});

for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(heart);
}
</script>

</body>
</html>
