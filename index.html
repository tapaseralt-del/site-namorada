<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para Ana 💖</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
text-align:center;
overflow:hidden;
color:white;

background:linear-gradient(-45deg,#ff4da6,#ff85c1,#8a2be2,#ff1a75);
background-size:400% 400%;
animation:gradiente 10s ease infinite;
}

@keyframes gradiente{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:50px;
}

#contador{
font-size:22px;
margin-bottom:20px;
}

.carta{
width:320px;
height:200px;
background:white;
border-radius:10px;
cursor:pointer;
position:relative;
overflow:hidden;
color:black;
transition:0.6s;
}

.carta:hover{
transform:scale(1.05);
}

.texto{
opacity:0;
padding:20px;
transition:1s;
}

.carta.aberta{
height:340px;
}

.carta.aberta .texto{
opacity:1;
}

.heart{
position:absolute;
font-size:25px;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Ana 💖</h1>

<div id="contador"></div>

<div class="carta" onclick="abrirCarta()" id="carta">

<div class="texto">

<p>
Ana, desde o dia em que começamos nossa amizade,
eu percebi o quanto você é uma pessoa especial.
</p>

<p>
Obrigado por existir e por fazer parte da minha vida. 💖
</p>

<p>
Feliz Dia das Mulheres 🌸
</p>

</div>

</div>

<button onclick="tocar()">Tocar música 🎵</button>

<audio id="musica" loop>
<source src="EU TE ESCOLHERIA TODO DIA - PAGODE - PAGODES PARA STATUS.mp3" type="audio/mpeg">
</audio>

<script>

function abrirCarta(){
document.getElementById("carta").classList.toggle("aberta")
}

function tocar(){
document.getElementById("musica").play()
}

let inicio=new Date("2026-02-17")
let hoje=new Date()

function atualizar(){

let diff=hoje-inicio

let dias=Math.floor(diff/(1000*60*60*24))
let horas=Math.floor(diff/(1000*60*60)%24)
let minutos=Math.floor(diff/(1000*60)%60)

document.getElementById("contador").innerHTML=
"Amizade há "+dias+" dias, "+horas+" horas e "+minutos+" minutos 💖"

}

setInterval(atualizar,1000)

for(let i=0;i<35;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

}

</script>

</body>
</html>
