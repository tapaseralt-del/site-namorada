<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feliz Dia das Mulheres, Ana</title>

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff4da6,#8a2be2,#000000);
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

h1{
font-size:60px;
}

p{
font-size:24px;
max-width:700px;
margin:auto;
margin-top:20px;
}

.heart{
position:absolute;
top:-10px;
color:#ff4da6;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
}
100%{
transform:translateY(110vh);
}
}
</style>

</head>

<body>

<div class="container">

<h1>Feliz Dia das Mulheres, Ana! 💐</h1>

<p>Ana, hoje é um dia especial para celebrar mulheres incríveis como você.</p>

<p>Quero te desejar um Feliz Dia das Mulheres! Que seu dia seja cheio de alegria, carinho e momentos felizes.</p>

<p>Obrigado por ser uma amiga tão especial. Você merece tudo de melhor hoje e sempre. 💖</p>

</div>

<audio autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function criarCoracao(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);
}

setInterval(criarCoracao,300);
</script>

</body>
</html>
